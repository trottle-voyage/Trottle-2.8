name: trottle
description: Trottle 2.8 - Flutter Application
publish_to: 'none'
version: 2.8.0+1

# Trottle App Metadata
trottle:
  app_name: "Trottle"
  year: "2018"
  app_version: "2.8.0"
  info_version: "Trottle 2018-2026 - v2.8.0"

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  battery_plus: ^6.0.1
  connectivity_plus: ^6.0.5
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  firebase_core: ^3.6.0
  firebase_storage: ^12.3.0
  firebase_app_check: ^0.3.1+3
  firebase_auth: ^5.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icones/
    - assets/logos/
    - assets/stamps/
    - assets/photos/

  fonts:
    - family: LeagueSpartan
      fonts:
        - asset: assets/fonts/LeagueSpartan-Regular.ttf
          weight: 400
        - asset: assets/fonts/LeagueSpartan-SemiBold.ttf
          weight: 600

    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700

    - family: LeagueGothic
      fonts:
        - asset: assets/fonts/LeagueGothic-Regular.ttf
          weight: 400
